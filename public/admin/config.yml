backend:
  name: github
  repo: TreeAspen/Lab-website
  branch: main
  # OAuth proxy (Cloudflare Worker). Replace with your Worker URL after deploy.
  # See docs/CMS-SETUP.md for setup instructions.
  base_url: https://helloworld.sy4254.workers.dev
  auth_endpoint: auth

# Default media folder for new uploads. Each collection can override below.
media_folder: public/uploads
public_folder: /uploads

# Open editorial workflow = new posts go through draft → review → publish.
# Set to "simple" if you'd rather have edits go live immediately on save.
publish_mode: editorial_workflow

# UI language
locale: en

site_url: https://utoplab.net
display_url: https://utoplab.net
logo_url: https://utoplab.net/lab_logo.png

collections:
  - name: news
    label: "News"
    label_singular: "News item"
    folder: content/news
    media_folder: "/public/uploads/news"
    public_folder: "/uploads/news"
    create: true
    format: json
    extension: json
    slug: "{{id}}-{{slug}}"
    summary: "{{date}} · {{title}}"
    sortable_fields: [date, id, title]
    view_filters:
      - label: "This year"
        field: date
        pattern: "2026"
    fields:
      - { name: id, label: "ID (integer, unique, do not reuse)", widget: number, value_type: int, min: 1, hint: "Unique news ID; for a new entry, pick a number larger than the current maximum" }
      - { name: slug, label: "URL slug (lowercase, hyphens)", widget: string, hint: "Appears in /news/<here>; do not change after publishing" }
      - name: aliases
        label: "Old URL slugs (for backwards compatibility, optional)"
        widget: list
        required: false
        field: { name: alias, label: "Old slug", widget: string }
      - { name: title, label: "Title", widget: string }
      - { name: subtitle, label: "Subtitle (optional)", widget: string, required: false }
      - { name: date, label: "Date", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { name: author, label: "Author", widget: string }
      - { name: sponsor, label: "Sponsor (optional)", widget: string, required: false }
      - { name: mentors, label: "Mentors (optional)", widget: string, required: false }
      - name: tags
        label: "Tags"
        widget: list
        field: { name: tag, label: "Tag", widget: string }
      - { name: desc, label: "Home card summary", widget: text }
      - { name: detail, label: "Home card expanded detail", widget: text }
      - { name: externalLink, label: "External link (optional; if set, the home card shows 'Read Paper' instead of 'Learn More')", widget: string, required: false }

      - name: homeMedia
        label: "Home popup media (image/video shown in the right-hand animated window)"
        widget: object
        required: false
        fields:
          - { name: type, label: "Type", widget: select, options: ["image", "video"], default: "image" }
          - { name: src, label: "File", widget: file }

      - name: heroMedia
        label: "Detail page hero (image/video in the top decorative window)"
        widget: object
        required: false
        fields:
          - { name: type, label: "Type", widget: select, options: ["image", "video"], default: "image" }
          - { name: src, label: "File", widget: file }

      - name: contentMedia
        label: "Detail page body media (poster or demo video)"
        widget: object
        required: false
        fields:
          - { name: type, label: "Type", widget: select, options: ["image", "video"], default: "image" }
          - { name: src, label: "File", widget: file }

      - name: content
        label: "Body paragraphs (one per line)"
        widget: list
        field: { name: paragraph, label: "Paragraph", widget: text }

      - name: sections
        label: "Long-form sections (optional; for research-style write-ups)"
        widget: list
        required: false
        fields:
          - { name: heading, label: "Heading", widget: string }
          - { name: body, label: "Body (separate paragraphs with blank lines; lines starting with • render as bullet sub-points)", widget: text }
          - name: images
            label: "Images (multiple allowed)"
            widget: list
            required: false
            field: { name: image, label: "Image", widget: file }

  # ──────────────────────────────────────────────────────────
  - name: highlights
    label: "Research Highlights / Pillars"
    label_singular: "Highlight"
    folder: content/highlights
    media_folder: "/public/uploads/highlights"
    public_folder: "/uploads/highlights"
    create: false
    delete: false
    format: json
    extension: json
    summary: "{{order}}. {{title}} ({{id}})"
    fields:
      - { name: id, label: "ID (lowercase slug, used in URL; do not change after publishing)", widget: string }
      - { name: order, label: "Order (1, 2, 3 …)", widget: number, value_type: int, min: 1 }
      - { name: title, label: "Short title (e.g. Urban Sensing)", widget: string }
      - { name: label, label: "Home tab full label (e.g. Perceptive — Urban Sensing)", widget: string }
      - { name: num, label: "Pillar number (e.g. Pillar 1)", widget: string }
      - name: tags
        label: "Tab tags"
        widget: list
        field: { name: tag, label: "Tag", widget: string }
      - { name: summary, label: "Home summary paragraph 1", widget: text }
      - { name: focus, label: "Home summary paragraph 2", widget: text }
      - { name: homeVideo, label: "Home tab video", widget: file, required: false }
      - { name: ourWorkDesc, label: "Our Work card summary", widget: text }
      - { name: ourWorkColor, label: "Our Work card color (#hex)", widget: string, default: "#E2F16B" }
      - { name: heroImage, label: "Detail page hero image", widget: string, hint: "Either an external URL or a path after uploading a file" }
      - { name: heroVideo, label: "Detail page hero video (optional)", widget: file, required: false }
      - { name: embedHtml, label: "Detail page embedded HTML path (optional)", widget: string, required: false }
      - { name: aspectRatio, label: "Embed aspect ratio (optional, e.g. 9 / 8)", widget: string, required: false }
      - name: tagsDetail
        label: "Detail page tabs (optional)"
        widget: list
        required: false
        field: { name: tag, label: "Tag", widget: string }
      - name: overview
        label: "Overview paragraphs"
        widget: list
        field: { name: paragraph, label: "Paragraph", widget: text }
      - name: focusPoints
        label: "Research Focus points"
        widget: list
        field: { name: point, label: "Point", widget: text }
      - name: relatedProjects
        label: "Related projects (by slug)"
        widget: list
        field: { name: slug, label: "Project slug", widget: string }
      - name: publications
        label: "Selected Publications"
        widget: list
        required: false
        fields:
          - { name: citation, label: "Full citation", widget: text }
          - { name: link, label: "Link (DOI, optional)", widget: string, required: false }
      - name: conferences
        label: "Selected Conferences"
        widget: list
        required: false
        field: { name: conf, label: "Conference citation", widget: text }
      - name: mediaLink
        label: "External Media Link (optional)"
        widget: object
        required: false
        fields:
          - { name: label, label: "Button text", widget: string }
          - { name: url, label: "URL", widget: string }

  # ──────────────────────────────────────────────────────────
  - name: projects
    label: "Projects"
    label_singular: "Project"
    folder: content/projects
    media_folder: "/public/uploads/projects"
    public_folder: "/uploads/projects"
    create: true
    format: json
    extension: json
    slug: "{{id}}-{{slug}}"
    summary: "{{order}}. {{title}} [{{status}}]"
    sortable_fields: [order, year, title]
    fields:
      - { name: id, label: "ID (integer, unique)", widget: number, value_type: int, min: 1 }
      - { name: slug, label: "URL slug (lowercase)", widget: string }
      - { name: order, label: "Order", widget: number, value_type: int, min: 1 }
      - { name: title, label: "Title", widget: string }
      - { name: desc, label: "Short description (one sentence)", widget: text }
      - { name: heroImage, label: "Hero image (URL or upload)", widget: string }
      - { name: heroVideo, label: "Hero video (optional)", widget: file, required: false }
      - { name: embedHtml, label: "Interactive HTML path (optional)", widget: string, required: false }
      - name: gallery
        label: "Gallery (optional, multiple images)"
        widget: list
        required: false
        field: { name: image, label: "Image", widget: file }
      - name: tags
        label: "Tags"
        widget: list
        field: { name: tag, label: "Tag", widget: string }
      - { name: year, label: "Year", widget: string }
      - { name: status, label: "Status", widget: select, options: ["ACTIVE", "PROTOTYPE", "COMPLETED", "PAUSED"], default: "ACTIVE" }
      - { name: overview, label: "Overview", widget: text }
      - name: sections
        label: "Sections"
        widget: list
        fields:
          - { name: heading, label: "Heading", widget: string }
          - { name: body, label: "Body", widget: text }
          - { name: image, label: "Image (optional)", widget: file, required: false }
      - name: team
        label: "Team member names (string list)"
        widget: list
        field: { name: member, label: "Member", widget: string }

  # ──────────────────────────────────────────────────────────
  - name: people
    label: "People / Team"
    label_singular: "Person"
    folder: content/people
    media_folder: "/public/uploads/people"
    public_folder: "/uploads/people"
    create: true
    format: json
    extension: json
    slug: "{{order}}-{{id}}"
    summary: "{{order}}. {{name}} — {{role}}"
    sortable_fields: [order, name, category]
    view_groups:
      - label: "By category"
        field: category
    fields:
      - { name: id, label: "ID (lowercase slug, used in URL; do not change after publishing)", widget: string, hint: "e.g. zhaoxi-zhang" }
      - { name: order, label: "Order", widget: number, value_type: int, min: 1 }
      - { name: name, label: "Name (include 'Dr.' prefix if applicable)", widget: string }
      - { name: role, label: "Role (e.g. Lab Director, PhD Student)", widget: string }
      - { name: title, label: "Title / Degree (e.g. Assistant Professor, ...)", widget: string }
      - { name: category, label: "Category", widget: select, options: ["faculty", "phd", "master", "alumni"] }
      - { name: avatar, label: "Avatar", widget: image }
      - { name: bio, label: "Short bio (shown on list cards)", widget: text }
      - { name: fullBio, label: "Full biography", widget: markdown, required: false }
      - name: research
        label: "Research tags"
        widget: list
        field: { name: tag, label: "Tag", widget: string }
      - { name: email, label: "Email (optional)", widget: string, required: false }
      - { name: website, label: "Personal website (optional)", widget: string, required: false }
      - name: education
        label: "Education (optional)"
        widget: list
        required: false
        field: { name: edu, label: "Entry", widget: string }
      - name: publications
        label: "Selected publications"
        widget: list
        required: false
        fields:
          - { name: title, label: "Title", widget: string }
          - { name: venue, label: "Venue / Conference", widget: string }
          - { name: year, label: "Year", widget: string }
          - { name: link, label: "Link (optional)", widget: string, required: false }
      - name: projects
        label: "Projects involved (by project slug)"
        widget: list
        required: false
        field: { name: slug, label: "Project slug", widget: string }
